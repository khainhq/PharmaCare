<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tài chính - PharmaCare</title>
  <link rel="icon" href="../../assets/img/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="../../assets/css/app.css?v=20260620-posdetail1">
</head>
<body class="app-body" data-requires-auth="true" data-roles="quanly,admin" data-nav="tai-chinh" data-title="Quản lý tài chính">
  <div id="overlay" class="overlay"></div>
  <div class="app-layout">
    <aside id="sidebar" class="sidebar"></aside>
    <div class="app-main">
      <header id="topbar" class="topbar"></header>
      <main class="content">
        <section class="page-title">
          <div>
            <h1>Quản lý thu chi</h1>
            <p>Tạo phiếu thu, phiếu chi, xem khoản thu chi và theo dõi dòng tiền vào ra của nhà thuốc.</p>
          </div>
        </section>

        <section class="two-col">
          <div>
            <div class="panel-header">
              <h2>Danh sách phiếu thu chi</h2>
              <span class="tag">Theo ngày tạo</span>
            </div>
            <div id="financeTable" class="table-wrap" aria-label="Bảng thu chi"></div>
          </div>

          <aside class="panel">
            <div class="panel-header">
              <h2>Tạo phiếu mới</h2>
              <span class="tag">Mẫu nhập liệu</span>
            </div>
            <form class="form-grid">
              <div class="form-row">
                <label for="financeType">Loại phiếu</label>
                <select id="financeType" class="form-select">
                  <option>Phiếu thu</option>
                  <option>Phiếu chi</option>
                </select>
              </div>
              <div class="form-row">
                <label for="financeAmount">Số tiền</label>
                <input id="financeAmount" class="form-control" type="number" min="0" placeholder="0">
              </div>
              <div class="form-row">
                <label for="financeContent">Nội dung</label>
                <textarea id="financeContent" class="form-textarea" placeholder="Nhập nội dung thu chi"></textarea>
              </div>
              <button class="btn btn-primary" type="button" data-toast="Phiếu thu chi đã được ghi nhận trên giao diện.">Lưu phiếu</button>
            </form>
          </aside>
        </section>
      </main>
    </div>
  </div>

  <script>window.PHARMA_BASE = "../../";</script>
  <script src="../../assets/js/app.js?v=20260620-posdetail1"></script>
</body>
</html>

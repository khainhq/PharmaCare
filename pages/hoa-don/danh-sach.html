<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Hóa đơn - PharmaCare</title>
  <link rel="icon" href="../../assets/img/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="../../assets/css/app.css?v=20260614-font2">
</head>
<body class="app-body" data-requires-auth="true" data-roles="banthuoc,quanly,admin" data-nav="hoa-don" data-title="Quản lý hóa đơn">
  <div id="overlay" class="overlay"></div>
  <div class="app-layout">
    <aside id="sidebar" class="sidebar"></aside>
    <div class="app-main">
      <header id="topbar" class="topbar"></header>
      <main class="content">
        <section class="page-title">
          <div>
            <h1>Quản lý hóa đơn bán hàng</h1>
            <p>Xem hóa đơn, kiểm tra trạng thái, hủy hóa đơn và chuẩn bị dữ liệu thống kê bán hàng.</p>
          </div>
          <button class="btn btn-primary" type="button" data-toast="Mẫu hóa đơn chi tiết sẽ mở ở giai đoạn sau.">Tạo hóa đơn</button>
        </section>

        <section class="toolbar" aria-label="Bộ lọc hóa đơn">
          <div class="toolbar-group">
            <div class="search-box">
              <span data-icon="search"></span>
              <input id="invoiceSearch" class="form-control" type="search" placeholder="Tìm mã hóa đơn, khách hàng, nhân viên">
            </div>
            <select class="form-select" style="width:210px" aria-label="Lọc trạng thái hóa đơn">
              <option>Tất cả trạng thái</option>
              <option>Đã thanh toán</option>
              <option>Chờ kiểm tra</option>
              <option>Đã hủy</option>
            </select>
          </div>
          <button class="btn btn-light" type="button" data-toast="Tác vụ xuất danh sách sẽ nối backend ở giai đoạn sau.">Xuất danh sách</button>
        </section>

        <section id="invoiceTable" class="table-wrap" aria-label="Bảng hóa đơn"></section>
      </main>
    </div>
  </div>

  <script>window.PHARMA_BASE = "../../";</script>
  <script src="../../assets/js/app.js?v=20260614-font2"></script>
</body>
</html>

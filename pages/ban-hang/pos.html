<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bán hàng - PharmaCare</title>
  <link rel="icon" href="../../assets/img/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="../../assets/css/app.css?v=20260614-slider1">
</head>
<body class="app-body" data-requires-auth="true" data-roles="banthuoc,quanly,admin" data-nav="ban-hang" data-title="Bán hàng tại quầy">
  <div id="overlay" class="overlay"></div>
  <div class="app-layout">
    <aside id="sidebar" class="sidebar"></aside>
    <div class="app-main">
      <header id="topbar" class="topbar"></header>
      <main class="content">
        <section class="page-title">
          <div>
            <h1>Bán hàng tại quầy</h1>
            <p>Thêm thuốc vào hóa đơn, điều chỉnh số lượng, nhập giảm giá và xác nhận đơn hàng trong giao diện POS mẫu.</p>
          </div>
          <button class="btn btn-outline" type="button" data-toast="Chức năng in hóa đơn sẽ kết nối thiết bị ở giai đoạn sau.">In hóa đơn</button>
        </section>

        <section class="pos-grid">
          <div>
            <div class="toolbar">
              <div class="toolbar-group">
                <div class="search-box">
                  <span data-icon="search"></span>
                  <input id="posSearch" class="form-control" type="search" placeholder="Tìm theo tên, mã, hoạt chất, nhóm thuốc">
                </div>
                <select class="form-select" style="width:190px" aria-label="Lọc nhóm">
                  <option>Tất cả nhóm</option>
                  <option>Thuốc</option>
                  <option>Thực phẩm chức năng</option>
                  <option>Dược mỹ phẩm</option>
                  <option>Thiết bị y tế</option>
                </select>
              </div>
              <span class="tag">Dữ liệu bán hàng mẫu</span>
            </div>
            <div id="productGrid" class="product-grid"></div>
          </div>

          <aside class="cart-panel" aria-label="Hóa đơn hiện tại">
            <div class="panel-header">
              <h2>Hóa đơn</h2>
              <span class="tag">Tạm tính</span>
            </div>
            <div id="cartList" class="cart-list"></div>
            <div class="form-row">
              <label for="discountInput">Mã giảm giá hoặc số tiền giảm</label>
              <input id="discountInput" class="form-control" type="number" min="0" step="1000" placeholder="0">
            </div>
            <div class="cart-total">
              <div><span>Tạm tính</span><strong id="subtotal">0 đ</strong></div>
              <div><span>Giảm giá</span><strong id="discountValue">0 đ</strong></div>
              <div class="grand"><span>Tổng thanh toán</span><strong id="grandTotal">0 đ</strong></div>
            </div>
            <div class="auth-actions">
              <button id="checkoutButton" class="btn btn-primary" type="button">Xác nhận đơn hàng</button>
              <button class="btn btn-light" type="button" data-toast="Hóa đơn mẫu đã được làm mới ở giao diện.">Hủy thao tác</button>
            </div>
          </aside>
        </section>
      </main>
    </div>
  </div>

  <script>window.PHARMA_BASE = "../../";</script>
  <script src="../../assets/js/app.js?v=20260614-slider1"></script>
</body>
</html>

<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Kho hàng - PharmaCare</title>
  <link rel="icon" href="../../assets/img/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="../../assets/css/app.css?v=20260620-posdetail1">
</head>
<body class="app-body" data-requires-auth="true" data-roles="quanly,admin" data-nav="kho" data-title="Kho hàng và cảnh báo">
  <div id="overlay" class="overlay"></div>
  <div class="app-layout">
    <aside id="sidebar" class="sidebar"></aside>
    <div class="app-main">
      <header id="topbar" class="topbar"></header>
      <main class="content">
        <section class="page-title">
          <div>
            <h1>Kho hàng và cảnh báo</h1>
            <p>Quản lý nhập xuất kho, theo dõi số lượng tồn, trạng thái hàng hóa và cảnh báo hạn sử dụng.</p>
          </div>
          <div class="toolbar-group">
            <button class="btn btn-primary" type="button" data-toast="Phiếu nhập kho sẽ được kết nối ở giai đoạn sau.">Nhập kho</button>
            <button class="btn btn-light" type="button" data-toast="Phiếu xuất kho sẽ được kết nối ở giai đoạn sau.">Xuất kho</button>
          </div>
        </section>

        <section id="kpiGrid" class="stat-grid" aria-label="Chỉ số kho hàng"></section>

        <section class="two-col">
          <div>
            <div class="panel-header">
              <h2>Danh sách tồn kho</h2>
              <span class="tag">Theo sản phẩm</span>
            </div>
            <div id="inventoryTable" class="table-wrap" aria-label="Bảng tồn kho"></div>
          </div>

          <div>
            <div class="panel-header">
              <h2>Cảnh báo cần xử lý</h2>
              <span class="tag tag-warning">Theo dõi</span>
            </div>
            <div id="alertList" class="alert-list"></div>
          </div>
        </section>
      </main>
    </div>
  </div>

  <script>window.PHARMA_BASE = "../../";</script>
  <script src="../../assets/js/app.js?v=20260620-posdetail1"></script>
</body>
</html>

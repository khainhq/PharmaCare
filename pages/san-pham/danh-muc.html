<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Danh mục sản phẩm - PharmaCare</title>
  <link rel="icon" href="../../assets/img/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="../../assets/css/app.css?v=20260614-categories1">
</head>
<body class="app-body" data-requires-auth="true" data-roles="banthuoc,quanly,admin" data-nav="san-pham" data-title="Danh mục sản phẩm">
  <div id="overlay" class="overlay"></div>
  <div class="app-layout">
    <aside id="sidebar" class="sidebar"></aside>
    <div class="app-main">
      <header id="topbar" class="topbar"></header>
      <main class="content">
        <section class="page-title">
          <div>
            <h1>Danh mục sản phẩm</h1>
            <p>Tra cứu thuốc và sản phẩm theo mã, tên, hoạt chất, nhóm hàng, nhà cung cấp, giá bán, tồn kho và hạn sử dụng.</p>
          </div>
          <button class="btn btn-primary" type="button" data-toast="Thêm sản phẩm sẽ được hoàn thiện ở giai đoạn sau.">Thêm sản phẩm</button>
        </section>

        <section class="toolbar" aria-label="Bộ lọc sản phẩm">
          <div class="toolbar-group">
            <div class="search-box">
              <span data-icon="search"></span>
              <input id="productSearch" class="form-control" type="search" placeholder="Tìm sản phẩm, hoạt chất, nhà cung cấp">
            </div>
            <select class="form-select" style="width:210px" aria-label="Lọc theo trạng thái">
              <option>Tất cả trạng thái</option>
              <option>Còn hàng</option>
              <option>Sắp hết</option>
              <option>Hết hàng</option>
            </select>
          </div>
          <button class="btn btn-light" type="button" data-toast="Bộ lọc nâng cao đã được đặt chỗ trong giao diện.">Lọc nâng cao</button>
        </section>

        <section id="productTable" class="table-wrap" aria-label="Bảng danh mục sản phẩm"></section>
      </main>
    </div>
  </div>

  <script>window.PHARMA_BASE = "../../";</script>
  <script src="../../assets/js/app.js?v=20260614-categories1"></script>
</body>
</html>

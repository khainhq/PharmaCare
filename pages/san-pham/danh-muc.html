<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Danh mục sản phẩm - PharmaCare</title>
  <link rel="icon" href="../../assets/img/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="../../assets/css/app.css?v=20260622-report1">
</head>
<body class="app-body" data-requires-auth="true" data-roles="banthuoc,quanly,admin" data-nav="san-pham" data-title="Danh mục sản phẩm">
  <div id="overlay" class="overlay"></div>
  <div class="app-layout">
    <aside id="sidebar" class="sidebar"></aside>
    <div class="app-main">
      <header id="topbar" class="topbar"></header>
      <main class="content">
        <section class="page-title">
          <div>
            <h1>Danh mục sản phẩm</h1>
            <p>Tra cứu thuốc và sản phẩm theo mã, tên, hoạt chất, nhóm hàng, nhà cung cấp, giá bán, tồn kho và hạn sử dụng.</p>
          </div>
          <button id="addProductButton" class="btn btn-primary" type="button">Thêm sản phẩm</button>
        </section>

        <section class="toolbar" aria-label="Bộ lọc sản phẩm">
          <div class="toolbar-group">
            <div class="search-box">
              <span data-icon="search"></span>
              <input id="productSearch" class="form-control" type="search" placeholder="Tìm sản phẩm, hoạt chất, nhà cung cấp">
            </div>
            <select id="productStatusFilter" class="form-select" style="width:210px" aria-label="Lọc theo trạng thái">
              <option value="">Tất cả trạng thái</option>
              <option value="Còn hàng">Còn hàng</option>
              <option value="Sắp hết">Sắp hết</option>
              <option value="Hết hàng">Hết hàng</option>
            </select>
            <select id="productCategoryFilter" class="form-select" style="width:230px" aria-label="Lọc theo nhóm sản phẩm">
              <option value="">Tất cả nhóm</option>
            </select>
          </div>
          <button id="resetProductFilters" class="btn btn-light" type="button">Đặt lại lọc</button>
        </section>

        <section class="panel product-browser" id="productBrowser">
          <div class="product-browser-head">
            <div>
              <span class="eyebrow-inline" id="productBrowserCount">Danh sách sản phẩm</span>
              <h2 id="productBrowserTitle">Sản phẩm theo danh mục</h2>
            </div>
            <select id="categoryProductSelect" class="form-select" aria-label="Chọn danh mục sản phẩm"></select>
          </div>
          <div id="subcategoryPills" class="filter-pills" aria-label="Nhóm sản phẩm"></div>
          <div id="landingProductGrid" class="product-list-grid" aria-live="polite"></div>
          <div class="load-more-wrap">
            <button id="loadMoreProducts" class="btn btn-outline" type="button">Xem thêm sản phẩm</button>
          </div>
        </section>

        <section id="productTable" class="table-wrap" aria-label="Bảng danh mục sản phẩm"></section>
      </main>
    </div>
  </div>

  <script>window.PHARMA_BASE = "../../";</script>
  <script src="../../assets/js/app.js?v=20260622-inventory1"></script>
</body>
</html>

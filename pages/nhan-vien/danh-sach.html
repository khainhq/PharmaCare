<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Nhân viên - PharmaCare</title>
  <link rel="icon" href="../../assets/img/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="../../assets/css/app.css?v=20260615-producthead2">
</head>
<body class="app-body" data-requires-auth="true" data-roles="quanly,admin" data-nav="nhan-vien" data-title="Quản lý nhân viên">
  <div id="overlay" class="overlay"></div>
  <div class="app-layout">
    <aside id="sidebar" class="sidebar"></aside>
    <div class="app-main">
      <header id="topbar" class="topbar"></header>
      <main class="content">
        <section class="page-title">
          <div>
            <h1>Quản lý nhân viên</h1>
            <p>Xem danh sách, xem chi tiết, thêm nhân viên, sửa thông tin, cập nhật tài khoản và trạng thái làm việc.</p>
          </div>
          <button class="btn btn-primary" type="button" data-toast="Thêm nhân viên sẽ được hoàn thiện ở giai đoạn sau.">Thêm nhân viên</button>
        </section>

        <section class="toolbar" aria-label="Bộ lọc nhân viên">
          <div class="toolbar-group">
            <div class="search-box">
              <span data-icon="search"></span>
              <input id="employeeSearch" class="form-control" type="search" placeholder="Tìm mã, họ tên, vai trò, số điện thoại">
            </div>
            <select class="form-select" style="width:210px" aria-label="Lọc vai trò">
              <option>Tất cả vai trò</option>
              <option>Quản lý</option>
              <option>Dược sĩ</option>
              <option>Nhân viên bán thuốc</option>
              <option>Kho</option>
            </select>
          </div>
        </section>

        <section id="employeeTable" class="table-wrap" aria-label="Bảng nhân viên"></section>
      </main>
    </div>
  </div>

  <script>window.PHARMA_BASE = "../../";</script>
  <script src="../../assets/js/app.js?v=20260615-producthead2"></script>
</body>
</html>

<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Đăng nhập PharmaCare">
  <title>Đăng nhập - PharmaCare</title>
  <link rel="icon" href="../assets/img/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="../assets/css/app.css?v=20260620-poscart1">
</head>
<body class="auth-page">
  <main class="auth-shell">
    <section class="auth-copy" aria-label="Thông tin PharmaCare">
      <a class="brand" href="../index.html" aria-label="PharmaCare">
        <img src="../assets/img/logo.svg" alt="PharmaCare">
      </a>
      <h1>Đăng nhập vào hệ thống quản lý nhà thuốc</h1>
    </section>

    <section class="auth-panel" aria-labelledby="loginTitle">
      <h1 id="loginTitle">Đăng nhập</h1>
      <p>Nhập tài khoản được cấp hoặc email đã đăng ký trong hệ thống.</p>

      <div id="authAlert" class="alert" role="status"></div>

      <form id="loginForm" class="form-grid" autocomplete="on">
        <div class="form-row">
          <label for="account">Tài khoản hoặc email</label>
          <input id="account" class="form-control" name="account" type="text" autocomplete="username" required>
        </div>
        <div class="form-row">
          <label for="password">Mật khẩu</label>
          <input id="password" class="form-control" name="password" type="password" autocomplete="current-password" required>
        </div>
        <div class="auth-actions">
          <button class="btn btn-primary" type="submit">Đăng nhập</button>
        </div>
      </form>

      <div class="divider"><span>Hoặc đăng nhập bằng</span></div>
      <div class="social-row">
        <button class="btn btn-light" type="button" data-social-login="google">Google</button>
        <button class="btn btn-light" type="button" data-social-login="facebook">Facebook</button>
      </div>

      <p class="auth-switch">Chưa có tài khoản? <a href="register.html">Đăng ký tại đây</a></p>
      <p class="form-note"><a href="../index.html">Quay lại trang giới thiệu</a></p>
    </section>
  </main>

  <script>
    window.PHARMA_BASE = "../";
  </script>
  <script src="../assets/js/app.js?v=20260620-posdetail1"></script>
  <script src="../assets/js/auth.js?v=20260614-cleanui1"></script>
</body>
</html>
